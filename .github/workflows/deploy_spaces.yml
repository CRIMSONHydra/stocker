name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy-env-space:
    name: Deploy environment Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Ensure Space exists + set secrets
        env:
          HF_TOKEN:     ${{ secrets.HF_TOKEN }}
          API_BASE_URL: ${{ secrets.HF_API_BASE_URL }}
          MODEL_NAME:   ${{ secrets.HF_MODEL_NAME }}
        run: |
          pip install --quiet "huggingface_hub>=1.10"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "Hydr473/stocker"
          api.create_repo(repo_id=repo, repo_type="space", space_sdk="docker", exist_ok=True)
          # Optional secrets — env Space only needs them if /inference is hit
          for k in ("HF_TOKEN", "API_BASE_URL", "MODEL_NAME"):
              v = os.environ.get(k, "")
              if v:
                  api.add_space_secret(repo_id=repo, key=k, value=v)
          PY

      - name: Push to Hydr473/stocker Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf-space \
            https://Hydr473:${HF_TOKEN}@huggingface.co/spaces/Hydr473/stocker
          git push hf-space main --force

  deploy-train-space:
    name: Deploy training Space Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Space exists + set secrets
        env:
          HF_TOKEN:     ${{ secrets.HF_TOKEN }}
          API_BASE_URL: ${{ secrets.HF_API_BASE_URL }}
          MODEL_NAME:   ${{ secrets.HF_MODEL_NAME }}
          RESULTS_REPO: ${{ secrets.HF_RESULTS_REPO }}
        run: |
          pip install --quiet "huggingface_hub>=1.10"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "Hydr473/stocker-train"
          api.create_repo(repo_id=repo, repo_type="space", space_sdk="docker", exist_ok=True)
          # Required secrets for the training pipeline
          for k in ("HF_TOKEN", "API_BASE_URL", "MODEL_NAME", "RESULTS_REPO"):
              v = os.environ.get(k, "")
              if v:
                  api.add_space_secret(repo_id=repo, key=k, value=v)
                  print(f"  set secret {k}")
          PY

      - name: Push Dockerfile to Hydr473/stocker-train Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone \
            https://Hydr473:${HF_TOKEN}@huggingface.co/spaces/Hydr473/stocker-train \
            /tmp/train-space
          cp spaces/train/Dockerfile /tmp/train-space/Dockerfile
          cp spaces/train/app.py     /tmp/train-space/app.py
          cd /tmp/train-space
          git config user.email "ci@github.com"
          git config user.name  "GitHub Actions"
          git add Dockerfile app.py
          git diff --staged --quiet || git commit -m "ci: sync from stocker@${{ github.sha }}"
          git push
